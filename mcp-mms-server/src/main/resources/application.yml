spring:
  application:
    name: mcp-mms-server
  ai:
    mcp:
      server:
        name: mms-mcp-server
        version: 1.0.0
        type: SYNC
        sse-message-endpoint: /mcp/message
        resource-change-notification: true
        prompt-change-notification: true
        tool-change-notification: true

server:
  port: 8081

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always

logging:
  level:
    com.walmart.mcp.mms: DEBUG
    org.springframework.ai.mcp: INFO
